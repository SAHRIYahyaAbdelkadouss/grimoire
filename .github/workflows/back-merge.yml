name: Back-merge main into develop

on:
  workflow_run:
    workflows: ['Publish to npm']
    types: [completed]

jobs:
  open-pr:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Open back-merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create --base develop --head main \
            --title "chore : back-merge after $(git describe --tags --abbrev=0)" \
            --body "Automated back-merge. See **Files changed** tab." \
            || echo "PR already exists or branches are in sync."
